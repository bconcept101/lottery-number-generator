name: Update Jackpot Information

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */2 * * *"

permissions:
  contents: write

concurrency:
  group: update-jackpot-information
  cancel-in-progress: false

jobs:
  update-jackpots:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh jackpot information
        run: node scripts/update-jackpots.js

      - name: Commit refreshed jackpot information
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jackpot-data.js

          if git diff --cached --quiet; then
            echo "No jackpot changes were found."
          else
            git commit -m "Update jackpot information"
            git push
          fi
