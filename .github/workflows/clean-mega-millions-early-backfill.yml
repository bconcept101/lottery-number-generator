name: Clean Mega Millions Early Backfill

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  clean-mega-millions-early-backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Clean Mega Millions early backfill
        run: node scripts/clean-mega-millions-early-backfill.js

      - name: Commit cleaned Mega Millions early backfill
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/cleaned/mega-millions-early-backfill-cleaned.json
          git add MEGA-MILLIONS-EARLY-BACKFILL-REVIEW.md
          git diff --cached --quiet || git commit -m "Clean Mega Millions early backfill history"
          git push
