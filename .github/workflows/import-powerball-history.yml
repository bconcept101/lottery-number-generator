name: Import Powerball History to Supabase

on:
  workflow_dispatch:

  schedule:
    - cron: "30 9 * * 2,4,0"
    - cron: "30 10 * * 2,4,0"

jobs:
  import-powerball-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Import Powerball history to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/import-powerball-history-to-supabase.js
