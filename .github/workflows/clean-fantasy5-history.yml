name: Clean Fantasy 5 History

on:
  workflow_dispatch:
  push:
    paths:
      - "data/raw/fantasy5-history.csv"
      - "scripts/clean-fantasy5-history.js"
      - ".github/workflows/clean-fantasy5-history.yml"

permissions:
  contents: write

jobs:
  clean-fantasy5-history:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Fantasy 5 cleaning script
        run: node scripts/clean-fantasy5-history.js

      - name: Show generated files
        run: |
          ls -la
          ls -la data
          ls -la data/cleaned || true
          test -f data/cleaned/fantasy5-history-cleaned.json
          test -f FANTASY5-DUPLICATE-REVIEW.md

      - name: Commit cleaned Fantasy 5 history files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cleaned/fantasy5-history-cleaned.json FANTASY5-DUPLICATE-REVIEW.md
          git status
          git commit -m "Update cleaned Fantasy 5 history data" || echo "No Fantasy 5 cleaned changes to commit"
          git push
