name: Update Latest Lottery Results

on:
  workflow_dispatch:

  schedule:
    - cron: "10 9 * * *"
    - cron: "55 9 * * *"
    - cron: "10 18 * * *"
    - cron: "55 18 * * *"

permissions:
  contents: write

jobs:
  update-latest-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update latest-results.js
        run: node scripts/update-latest-results.js

      - name: Commit latest-results.js
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add latest-results.js
          git diff --cached --quiet || git commit -m "Update latest lottery results"
          git push

      - name: Sync latest results to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-latest-results-to-supabase.js
