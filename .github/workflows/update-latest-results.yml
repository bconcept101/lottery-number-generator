name: Update Latest Lottery Results

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate current results without changing GitHub or Supabase"
        required: true
        default: true
        type: boolean

  schedule:
    # Morning update runs for Fantasy 5, Powerball, and Mega Millions.
    # GitHub cron uses UTC.
    - cron: "10 7 * * *"
    - cron: "10 8 * * *"
    - cron: "10 9 * * *"
    - cron: "55 9 * * *"

    # Afternoon update runs for Georgia FIVE Midday.
    - cron: "35 17 * * *"
    - cron: "10 18 * * *"
    - cron: "55 18 * * *"
    - cron: "40 19 * * *"

    # Evening update runs for Georgia FIVE Evening.
    - cron: "10 0 * * *"
    - cron: "55 0 * * *"
    - cron: "40 1 * * *"

permissions:
  contents: write

jobs:
  update-latest-results:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update latest-results.js
        if: ${{ github.event_name == 'schedule' || inputs.dry_run == false }}
        run: node scripts/update-latest-results.js

      - name: Commit latest-results.js
        if: ${{ github.event_name == 'schedule' || inputs.dry_run == false }}
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add latest-results.js
          git diff --cached --quiet || git commit -m "Update latest lottery results"
          git push

      - name: Validate latest results without database writes
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true }}
        env:
          SYNC_DRY_RUN: "true"
        run: node scripts/sync-latest-results-to-supabase.js

      - name: Sync latest results to Supabase
        if: ${{ github.event_name == 'schedule' || inputs.dry_run == false }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node scripts/sync-latest-results-to-supabase.js
